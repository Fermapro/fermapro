<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A7B"/>
      <stop offset="100%" style="stop-color:#162d63"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0608A"/>
      <stop offset="100%" style="stop-color:#E8457A"/>
    </linearGradient>
  </defs>

  <!-- Fond arrondi -->
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>

  <!-- Barre décorative rose en haut à gauche -->
  <rect x="72" y="72" width="80" height="14" rx="7" fill="url(#accent)" opacity="0.9"/>

  <!-- Lettre F -->
  <!-- Barre verticale gauche -->
  <rect x="122" y="106" width="58" height="300" rx="12" fill="white"/>
  <!-- Barre horizontale haute -->
  <rect x="122" y="106" width="220" height="58" rx="12" fill="white"/>
  <!-- Barre horizontale milieu -->
  <rect x="122" y="210" width="175" height="54" rx="12" fill="url(#accent)"/>

  <!-- Point rose décoratif en bas à droite -->
  <circle cx="368" cy="368" r="42" fill="url(#accent)" opacity="0.9"/>
  <circle cx="368" cy="368" r="22" fill="white" opacity="0.25"/>
</svg>